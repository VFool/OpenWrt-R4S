name: OpenWrt Builder

on:
  repository_dispatch:
  workflow_dispatch:
    inputs:
      APPLY_PATCHES:
        description: '应用补丁'
        type: boolean
        default: true

env:
  REPO_URL: https://github.com/VFool/immortalwrt
  REPO_BRANCH: v24.10.5
  FEEDS_CONF: feeds.conf.default
  CONFIG_FILE: .config
  DIY_P1_SH: diy-part1.sh
  DIY_P2_SH: diy-part2.sh
  UPLOAD_BIN_DIR: true
  UPLOAD_FIRMWARE: true
  UPLOAD_RELEASE: true
  TZ: Asia/Shanghai
  CCACHE_DIR: /workdir/ccache
  CCACHE_MAXSIZE: 2G

jobs:
  build:
    runs-on: ubuntu-22.04

    steps:
    - name: Checkout
      uses: actions/checkout@v4

    - name: Initialization environment
      run: |
        sudo rm -rf /etc/apt/sources.list.d/* /usr/share/dotnet /usr/local/lib/android /opt/ghc /opt/hostedtoolcache/CodeQL
        sudo docker image prune --all --force
        sudo apt-get -qq update
        sudo apt-get -qq install --no-install-recommends \
          build-essential ccache flex gawk gettext git libncurses5-dev \
          libssl-dev python3 python3-pyelftools python3-setuptools rsync subversion swig unzip wget zlib1g-dev
        sudo apt-get -qq autoremove --purge
        sudo apt-get -qq clean
        sudo timedatectl set-timezone "$TZ"
        sudo mkdir -p /workdir
        sudo chown -R $USER:$(id -gn) /workdir
        echo "CCACHE_DIR=$CCACHE_DIR" >> $GITHUB_ENV
        mkdir -p $CCACHE_DIR

    - name: Clone source code
      run: |
        git clone $REPO_URL -b $REPO_BRANCH /workdir/openwrt
        ln -sf /workdir/openwrt $GITHUB_WORKSPACE/openwrt

    - name: Load custom feeds
      run: |
        [ -e $FEEDS_CONF ] && mv $FEEDS_CONF openwrt/feeds.conf.default
        chmod +x $DIY_P1_SH
        cd openwrt && $GITHUB_WORKSPACE/$DIY_P1_SH

    - name: Update feeds
      run: cd openwrt && ./scripts/feeds update -a

    - name: Install feeds
      run: cd openwrt && ./scripts/feeds install -a

    - name: Load custom configuration
      run: |
        [ -e files ] && mv files openwrt/files
        [ -e $CONFIG_FILE ] && mv $CONFIG_FILE openwrt/.config
        chmod +x $DIY_P2_SH
        cd openwrt && $GITHUB_WORKSPACE/$DIY_P2_SH

    - name: Cache build artifacts
      uses: actions/cache@v4
      with:
        path: |
          openwrt/dl
          openwrt/build_dir
          ${{ env.CCACHE_DIR }}
        key: ${{ runner.os }}-openwrt-${{ env.REPO_BRANCH }}-${{ hashFiles('openwrt/.config') }}
        restore-keys: ${{ runner.os }}-openwrt-${{ env.REPO_BRANCH }}-

    - name: Download package
      run: |
        cd openwrt
        make defconfig
        make download -j$(nproc)
        find dl -size -1024c -delete

    - name: Apply patches (conditional)
      if: github.event.inputs.APPLY_PATCHES == 'true'
      run: |
        cd openwrt

        # 快速检查是否存在内核补丁，以决定是否需要 prepare 内核源码
        NEED_KERNEL_PREPARE=false
        if [ -d "$GITHUB_WORKSPACE/patches" ]; then
          for patch in "$GITHUB_WORKSPACE"/patches/*.patch; do
            [ -f "$patch" ] || continue
            if grep -qE '^[-+]{3} [ab]/(arch|drivers|sound|fs|net|kernel|include)/' "$patch"; then
              NEED_KERNEL_PREPARE=true
              break
            fi
          done
        fi

        if [ "$NEED_KERNEL_PREPARE" = true ]; then
          echo "Kernel patches detected, preparing kernel source..."
          make target/linux/prepare V=s QUILT=1
          KERNEL_BUILD_DIR=$(find build_dir/target-* -type d -name "linux-*" | head -1)
          if [ -z "$KERNEL_BUILD_DIR" ]; then
            echo "Error: Kernel build directory not found!"
            exit 1
          fi
          echo "Kernel source located at: $KERNEL_BUILD_DIR"
        else
          echo "No kernel patches detected, skipping kernel preparation."
        fi

        if [ -d "$GITHUB_WORKSPACE/patches" ]; then
          for patch in "$GITHUB_WORKSPACE"/patches/*.patch; do
            [ -f "$patch" ] || continue
            echo "Processing $(basename "$patch")"
            if grep -qE '^[-+]{3} [ab]/(arch|drivers|sound|fs|net|kernel|include)/' "$patch"; then
              if [ "$NEED_KERNEL_PREPARE" = true ]; then
                echo "  -> Applying kernel patch in kernel tree..."
                (cd "$KERNEL_BUILD_DIR" && patch -p1 < "$patch") || \
                  echo "  -> Warning: Failed to apply kernel patch $(basename "$patch")"
              else
                echo "  -> Skipping kernel patch (kernel preparation bypassed)."
              fi
            else
              echo "  -> Applying OpenWrt patch in OpenWrt root..."
              patch -p1 < "$patch" || \
                echo "  -> Warning: Failed to apply OpenWrt patch $(basename "$patch")"
            fi
          done
        else
          echo "No patches directory found, skipping."
        fi

    - name: Compile the firmware
      run: |
        cd openwrt
        make -j$(nproc) V=sc || { echo "Fallback to single thread"; make -j1 V=s; }
        grep '^CONFIG_TARGET.*DEVICE.*=y' .config | sed -r 's/.*DEVICE_(.*)=y/\1/' > DEVICE_NAME
        [ -s DEVICE_NAME ] && echo "DEVICE_NAME=_$(cat DEVICE_NAME)" >> $GITHUB_ENV
        echo "FILE_DATE=_$(date +"%Y%m%d%H%M")" >> $GITHUB_ENV

    - name: Check disk usage
      if: always()
      run: df -hT

    - name: Upload bin directory
      uses: actions/upload-artifact@v4
      if: success() && env.UPLOAD_BIN_DIR == 'true'
      with:
        name: OpenWrt_bin${{ env.DEVICE_NAME }}${{ env.FILE_DATE }}
        path: openwrt/bin

    - name: Organize firmware files
      if: success() && env.UPLOAD_FIRMWARE == 'true'
      run: |
        cd openwrt/bin/targets/*/*
        rm -rf packages
        mkdir release
        cp *sysupgrade.bin *factory.bin release/ 2>/dev/null || true
        echo "FIRMWARE=$PWD/release" >> $GITHUB_ENV

    - name: Upload firmware directory
      uses: actions/upload-artifact@v4
      if: success() && env.UPLOAD_FIRMWARE == 'true'
      with:
        name: OpenWrt_firmware${{ env.DEVICE_NAME }}${{ env.FILE_DATE }}
        path: ${{ env.FIRMWARE }}

    - name: Generate release tag
      if: success() && env.UPLOAD_RELEASE == 'true'
      run: |
        echo "release_tag=$(date +"%Y.%m.%d-%H%M")" >> $GITHUB_OUTPUT
        touch release.txt

    - name: Upload firmware to release
      uses: softprops/action-gh-release@v2
      if: success() && env.UPLOAD_RELEASE == 'true'
      with:
        tag_name: ${{ steps.tag.outputs.release_tag }}
        body_path: release.txt
        files: ${{ env.FIRMWARE }}/*
      env:
        GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

    - name: Delete old workflow runs
      uses: Mattraks/delete-workflow-runs@v2
      with:
        retain_days: 0
        keep_minimum_runs: 2

    - name: Remove old releases
      uses: dev-drprasad/delete-older-releases@v0.2.1
      if: success() && env.UPLOAD_RELEASE == 'true'
      with:
        keep_latest: 3
        delete_tags: true
      env:
        GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
